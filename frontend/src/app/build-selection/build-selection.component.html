<div class="card-panel" style="max-width: 600px; margin: 48px auto;">
  <div class="rhombus-icon" style="position: absolute; top: -6px; left: -6px;"></div>
  
  <h2 style="color: var(--primary); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em;">Aetheric Command</h2>
  <p style="margin-bottom: 32px; color: var(--on-surface-variant);">Register your combat chassis. Select your armaments and finalize your somatic mutations before entering the grid.</p>

  <div style="margin-bottom: 24px;">
    <label class="mono-text" style="font-size: 12px; color: var(--outline); display: block; margin-bottom: 8px;">[ CHASSIS_ID: {{playerId}} ]</label>
    <input type="text" [(ngModel)]="playerName" placeholder="Enter Callsign" class="input-field" />
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
    <div>
      <label class="mono-text" style="font-size: 12px; color: var(--outline); display: block; margin-bottom: 8px;">HEAD_ARMOR</label>
      <select [(ngModel)]="head" class="input-field">
        <option value="None">None</option>
        <option value="IronHelm">Iron Helm</option>
        <option value="LeatherCowl">Leather Cowl</option>
      </select>
    </div>
    <div>
      <label class="mono-text" style="font-size: 12px; color: var(--outline); display: block; margin-bottom: 8px;">TORSO_ARMOR</label>
      <select [(ngModel)]="torso" class="input-field">
        <option value="None">None</option>
        <option value="LeatherArmor">Leather Armor</option>
        <option value="Chainmail">Chainmail</option>
      </select>
    </div>
    <div>
      <label class="mono-text" style="font-size: 12px; color: var(--outline); display: block; margin-bottom: 8px;">LEFT_HAND</label>
      <select [(ngModel)]="leftHand" class="input-field">
        <option value="None">None</option>
        <option value="Zweihander">Zweihander</option>
        <option value="Shortsword">Shortsword</option>
        <option value="Dagger">Dagger</option>
        <option value="KiteShield">Kite Shield</option>
        <option value="Buckler">Buckler</option>
      </select>
    </div>
    <div>
      <label class="mono-text" style="font-size: 12px; color: var(--outline); display: block; margin-bottom: 8px;">RIGHT_HAND</label>
      <select [(ngModel)]="rightHand" class="input-field">
        <option value="None">None</option>
        <option value="Zweihander">Zweihander</option>
        <option value="Shortsword">Shortsword</option>
        <option value="Dagger">Dagger</option>
      </select>
    </div>
  </div>

  <div style="margin-bottom: 32px;">
    <h3 style="font-size: 18px; margin-bottom: 16px; color: var(--on-surface-variant);">Somatic Mutations</h3>
    <div style="display: flex; gap: 16px;">
      <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" [(ngModel)]="hasAlpha" style="accent-color: var(--primary);" />
        <span class="mono-text">ALPHA_STRAIN (-6 Max HP)</span>
      </label>
      <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" [(ngModel)]="hasBeta" style="accent-color: var(--primary);" />
        <span class="mono-text">BETA_STRAIN (-2 Max HP)</span>
      </label>
    </div>
  </div>

  <button class="btn-gold" style="width: 100%;" (click)="joinGame()" [disabled]="!playerName">Initialize Sequence</button>
</div>
