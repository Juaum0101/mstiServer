<div class="card-panel" style="position: fixed; bottom: 16px; right: 16px; background-color: var(--surface-container-highest); z-index: 100;">
  <h4 class="mono-text" style="color: var(--primary); margin-bottom: 12px; font-size: 14px;">ADMIN COMMANDS</h4>
  <div style="display: flex; gap: 8px;">
    <button class="btn-gold" style="padding: 8px 16px; font-size: 12px;" (click)="startMatch()">START_MATCH</button>
    <button class="btn-gold" style="padding: 8px 16px; font-size: 12px; color: var(--error); border-color: var(--error);" (click)="resetGame()">RESET_GAME</button>
  </div>
</div>
