<div class="max-w-[600px] mx-auto p-4 md:p-8 flex flex-col gap-8">
  <!-- LOBBY ROSTER STEP -->
  <div class="flex-1 blueprint-card bg-surface-container-low p-6 md:p-8" *ngIf="state$ | async as state">
    <div class="flex items-center justify-between mb-6 border-b border-outline/30 pb-4">
      <h3 class="font-title-md text-primary flex items-center gap-2">
          Lobby Roster
      </h3>
      <span class="font-label-sm text-outline">{{ getActivePlayers(state).length }} Players</span>
    </div>

    <ul class="space-y-3 mb-8">
      <li *ngFor="let p of getActivePlayers(state)" class="flex flex-col sm:flex-row sm:items-center justify-between bg-surface-variant/50 p-4 border border-outline-variant rounded gap-4">
        <div>
          <span class="font-body-md text-on-surface">{{p.playerName}}</span>
        </div>
        <div class="flex items-center gap-1" [ngClass]="p.isReady ? 'text-primary' : 'text-tertiary'">
          <span class="font-label-sm text-[10px] uppercase">{{p.isReady ? '[Ready]' : '[Waiting]'}}</span>
        </div>
      </li>
    </ul>

    <div class="flex flex-col gap-4">
        <button (click)="voteToStart()" class="gold-btn w-full bg-primary text-on-primary font-title-md py-4 hover:bg-primary-fixed transition-colors flex items-center justify-center gap-2">
          Vote to Start
        </button>

        <button (click)="quitLobby()" class="w-full border border-error text-error font-title-md py-4 hover:bg-error hover:text-on-error transition-colors flex items-center justify-center gap-2">
          Quit
        </button>
    </div>

    <p *ngIf="state.gameState.phaseId !== 'READY_PHASE'" class="text-center mt-6 text-primary animate-pulse font-label-sm tracking-widest uppercase">
      MATCH STARTED. PROCEED TO TACTICAL.
    </p>
  </div>
</div>
